name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch: # Lets you trigger it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Subdirectory to Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: shaeel12/Bearing-Backend
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: gradio
          subdirectory: backend  # Extracts exactly this folder
